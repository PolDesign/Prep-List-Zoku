<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Prep List" />
  <title>Prep List</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #111; color: #f0ead6; font-family: 'Barlow Condensed', sans-serif; -webkit-tap-highlight-color: transparent; }
    input { outline: none; }
    button { cursor: pointer; font-family: 'Barlow Condensed', sans-serif; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(240,234,214,0.1); }

    @keyframes ping { 0%{transform:scale(1);opacity:.5} 75%,100%{transform:scale(2.2);opacity:0} }
    @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes vanish {
      0%   { opacity:1; transform:translateX(0); max-height:60px; padding-top:10px; padding-bottom:10px; }
      35%  { opacity:.4; transform:translateX(16px); }
      65%  { opacity:0; max-height:60px; }
      100% { opacity:0; max-height:0; padding-top:0; padding-bottom:0; border:none; }
    }

    .item-row {
      display:flex; align-items:center; gap:12px;
      padding:11px 6px 11px 4px;
      border-bottom:1px solid rgba(240,234,214,.07);
      cursor:pointer; border-radius:6px;
      transition:background .15s;
      animation:slideIn .25s ease;
      overflow:hidden;
    }
    .item-row:hover, .item-row:active { background:rgba(240,234,214,.05); }
    .item-row.vanishing { animation:vanish .65s cubic-bezier(.4,0,.2,1) forwards; pointer-events:none; }
    .check-btn {
      width:28px; height:28px; border-radius:50%;
      border:2px solid rgba(240,234,214,.2);
      flex-shrink:0; display:flex; align-items:center; justify-content:center;
      background:transparent; transition:all .18s;
    }
    .login-card { animation:fadeIn .35s ease; }

    #loading {
      position:fixed; inset:0; background:#111;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:9999;
    }
    .spinner {
      width:36px; height:36px; border-radius:50%;
      border:3px solid rgba(240,234,214,.1);
      border-top-color:#e8b86d;
      animation:spin .8s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:rgba(240,234,214,.4);font-family:'Barlow',sans-serif">Conectando…</div>
</div>

<div id="app"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ─── FIREBASE CONFIG ──────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA1hnFR_VcleS5okcbtPLJDW5eQNfkWwbE",
  authDomain: "prep-list-zoku.firebaseapp.com",
  databaseURL: "https://prep-list-zoku-default-rtdb.firebaseio.com",
  projectId: "prep-list-zoku",
  storageBucket: "prep-list-zoku.firebasestorage.app",
  messagingSenderId: "461681389274",
  appId: "1:461681389274:web:4a7b32f7fa6cf60e62bfe3"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// ─── DATA ─────────────────────────────────────────────────────────────────────
const PREP_DATA = [
  { section:"Olives",         items:["Marinate olives"] },
  { section:"Beef tartare",   items:["Cut and portion meat","Chop shallots","Chop pickels","Check brioche","Garlic mayo","Whip butter"] },
  { section:"Arancini",       items:["Cook risotto","Shape arancini","Panir arancini","Defrost","Tomato coulis"] },
  { section:"Hummus",         items:["Cook chickpea","Make hummus","Tahini dressing","Marinate Chickpeas"] },
  { section:"Ham and Cheese", items:["Cut Cheeses","Organize Ham"] },
  { section:"Salmon",         items:["Olive pate","Defrost Salmon","Chop Chives"] },
  { section:"Tomato",         items:["Check tomatoes","Check stracciatella"] },
  { section:"Croque",         items:["Besamel","Cut Cheeses","Salad","Vinegrette"] },
  { section:"Melanzani",      items:["Bake melanzani","Tahini sauce","Cook beans","Tomato foam","Shiso","Duqqa"] },
  { section:"Broccolini",     items:["Blanch broc","Mix crème fraîche","Chili oil","Toast almonds"] },
  { section:"Fish",           items:["Chimichurri rojo","Check fish"] },
  { section:"Sirloin",        items:["Spinat cream","Harissa","Celeriac cream","Portion meat","Bake potato","Potato salad"] },
  { section:"Shrimps",        items:["Cut tomato","Defrost shrimps","Cut butter","Cut parsley"] },
  { section:"Chicken",        items:["Puree","Prep chicken","Defrost chicken","Pickles"] },
  { section:"Crema catalana", items:[] },
  { section:"Fruit with yogurt", items:["Check fruits","Cut fruits","Yogurt foam"] },
  { section:"Cake of the day", items:[] },
];

const PALETTE = ["#FF6B6B","#FF9F43","#FFE66D","#6BCB77","#4ECDC4","#45B7D1","#A78BFA","#F472B6","#FB923C","#34D399"];

function buildInitialItems() {
  const s = {};
  PREP_DATA.forEach(sec => sec.items.forEach(item => {
    s[`${sec.section}__${item}`] = { done:false, visible:true, by:null };
  }));
  return s;
}

function timeAgo(ts) {
  if (!ts) return "";
  const d = Math.floor((Date.now()-ts)/1000);
  if (d<10) return "ahora";
  if (d<60) return `${d}s`;
  if (d<3600) return `${Math.floor(d/60)}m`;
  return `${Math.floor(d/3600)}h`;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  screen: "login",
  currentUser: null,
  users: [],
  items: buildInitialItems(),
  log: [],
  presence: {},
  newName: "",
  newColor: PALETTE[0],
  showReset: false,
};

// ─── FIREBASE SYNC ────────────────────────────────────────────────────────────
// Listen to all changes in real time
onValue(ref(db, "preplist"), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  if (data.items) {
    // Preserve local visibility animations
    const merged = { ...buildInitialItems(), ...data.items };
    // Keep visible=false for items already hidden locally
    Object.keys(state.items).forEach(k => {
      if (!state.items[k].visible) merged[k] = { ...merged[k], visible:false };
    });
    state.items = merged;
  }
  if (data.log) state.log = data.log ? Object.values(data.log).sort((a,b)=>b.at-a.at).slice(0,40) : [];
  if (data.users) state.users = Object.values(data.users);
  if (data.presence) {
    const fresh = {};
    Object.entries(data.presence).forEach(([id,p]) => {
      if (Date.now()-p.lastSeen < 15000) fresh[id] = p;
    });
    state.presence = fresh;
  }

  if (state.screen === "app") render();
  document.getElementById("loading").style.display = "none";
});

// Heartbeat presence
async function heartbeat() {
  if (!state.currentUser) return;
  try {
    await update(ref(db, `preplist/presence/${state.currentUser.id}`), {
      ...state.currentUser,
      lastSeen: Date.now(),
    });
  } catch(e) {}
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function joinUser(u) {
  state.currentUser = u;
  state.screen = "app";
  // Save user to Firebase
  await update(ref(db, `preplist/users/${u.id}`), u);
  await heartbeat();
  render();
}

async function checkItem(key, itemText) {
  if (state.items[key]?.done) return;
  const updated = { done:true, visible:true, by:{ id:state.currentUser.id, name:state.currentUser.name, color:state.currentUser.color } };
  state.items[key] = updated;

  const logEntry = { key, text:itemText, user:{ name:state.currentUser.name, color:state.currentUser.color }, at:Date.now() };

  try {
    await update(ref(db, `preplist/items/${key}`), updated);
    await update(ref(db, `preplist/log/${Date.now()}`), logEntry);
  } catch(e) {}

  render();
  setTimeout(() => {
    state.items[key] = { ...state.items[key], visible:false };
    render();
  }, 700);
}

async function resetAll() {
  const fresh = buildInitialItems();
  state.items = fresh;
  state.log = [];
  state.showReset = false;
  try {
    await set(ref(db, "preplist/items"), fresh);
    await set(ref(db, "preplist/log"), null);
  } catch(e) {}
  render();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (state.screen === "login") {
    app.innerHTML = renderLogin();
    attachLoginEvents();
  } else {
    app.innerHTML = renderApp();
    attachAppEvents();
  }
}

// ── LOGIN ──
function renderLogin() {
  const taken = state.users.map(u=>u.color);
  const free = PALETTE.filter(c=>!taken.includes(c));
  const activeColor = free.includes(state.newColor)?state.newColor:(free[0]||PALETTE[0]);

  const usersHTML = state.users.map(u=>`
    <button data-join="${u.id}" style="display:flex;align-items:center;gap:12px;padding:13px 16px;background:${u.color}12;border:1.5px solid ${u.color}44;border-radius:12px;cursor:pointer;width:100%;text-align:left;">
      <div style="width:34px;height:34px;border-radius:50%;background:${u.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#111;flex-shrink:0">${u.name.slice(0,2).toUpperCase()}</div>
      <span style="font-size:17px;font-weight:600;color:${u.color}">${u.name}</span>
      <span style="margin-left:auto;font-size:12px;color:rgba(240,234,214,.3)">Entrar →</span>
    </button>`).join("");

  const colorsHTML = PALETTE.map(c=>{
    const isTaken=taken.includes(c), isSel=activeColor===c&&!isTaken;
    return `<button data-color="${c}" ${isTaken?"disabled":""} style="width:30px;height:30px;border-radius:8px;background:${isTaken?"#2a2a2a":c};border:${isSel?"3px solid #fff":"3px solid transparent"};cursor:${isTaken?"not-allowed":"pointer"};opacity:${isTaken?.2:1};transform:${isSel?"scale(1.2)":"scale(1)"};transition:all .15s;padding:0"></button>`;
  }).join("");

  return `
  <div class="login-card" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:24px;">
    <div style="text-align:center">
      <div style="font-size:11px;letter-spacing:.2em;color:#e8b86d;font-weight:600;text-transform:uppercase;margin-bottom:4px">Dinner Service</div>
      <div style="font-size:38px;font-weight:700;color:#f0ead6;letter-spacing:.04em">PREP LIST</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:7px;margin-top:8px">
        <span style="position:relative;display:inline-flex;width:10px;height:10px">
          <span style="position:absolute;inset:0;border-radius:50%;background:#6BCB77;opacity:.5;animation:ping 1.4s cubic-bezier(0,0,.2,1) infinite"></span>
          <span style="position:relative;width:10px;height:10px;border-radius:50%;background:#6BCB77;display:block"></span>
        </span>
        <span style="font-size:12px;color:rgba(240,234,214,.35);font-family:'Barlow',sans-serif">Tiempo real · ${state.users.length} en cocina</span>
      </div>
    </div>

    ${state.users.length>0?`
    <div style="width:100%;max-width:360px">
      <div style="font-size:11px;letter-spacing:.15em;color:rgba(240,234,214,.3);text-transform:uppercase;margin-bottom:10px;font-weight:600">Equipo de hoy</div>
      <div style="display:flex;flex-direction:column;gap:7px">${usersHTML}</div>
    </div>`:""}

    <div style="width:100%;max-width:360px;background:rgba(240,234,214,.04);border:1px solid rgba(240,234,214,.1);border-radius:16px;padding:20px">
      <div style="font-size:11px;letter-spacing:.15em;color:rgba(240,234,214,.3);text-transform:uppercase;margin-bottom:14px;font-weight:600">
        ${state.users.length===0?"Crear primer usuario":"Añadir persona"}
      </div>
      <input id="name-input" type="text" placeholder="Tu nombre…" maxlength="16" value="${state.newName}"
        style="width:100%;padding:12px 14px;background:rgba(240,234,214,.06);border:1.5px solid ${activeColor}55;border-radius:10px;color:#f0ead6;font-size:16px;font-family:'Barlow',sans-serif;margin-bottom:14px"/>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${colorsHTML}</div>
      <button id="enter-btn" style="width:100%;padding:13px;background:${state.newName.trim()?activeColor:"rgba(240,234,214,.08)"};border:none;border-radius:10px;color:${state.newName.trim()?"#111":"rgba(240,234,214,.2)"};font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:${state.newName.trim()?"pointer":"not-allowed"};box-shadow:${state.newName.trim()?`0 6px 20px ${activeColor}44`:"none"};transition:all .2s">
        Entrar →
      </button>
    </div>
  </div>`;
}

function attachLoginEvents() {
  const taken = state.users.map(u=>u.color);
  const free = PALETTE.filter(c=>!taken.includes(c));

  document.querySelectorAll("[data-join]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const u=state.users.find(x=>x.id===btn.dataset.join);
      if(u) joinUser(u);
    });
  });

  const nameInput=document.getElementById("name-input");
  if(nameInput){
    nameInput.focus();
    nameInput.addEventListener("input",e=>{state.newName=e.target.value;updateEnterBtn();});
    nameInput.addEventListener("keydown",e=>{if(e.key==="Enter")tryEnter();});
  }

  document.querySelectorAll("[data-color]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const c=btn.dataset.color;
      if(!taken.includes(c)){state.newColor=c;render();}
    });
  });

  document.getElementById("enter-btn")?.addEventListener("click",tryEnter);

  function tryEnter(){
    const n=state.newName.trim();
    if(!n)return;
    const ac=free.includes(state.newColor)?state.newColor:(free[0]||PALETTE[0]);
    const u={id:`${n}_${Date.now()}`,name:n,color:ac};
    joinUser(u);
    state.newName="";
  }

  function updateEnterBtn(){
    const btn=document.getElementById("enter-btn");
    if(!btn)return;
    const ac=free.includes(state.newColor)?state.newColor:(free[0]||PALETTE[0]);
    const ok=state.newName.trim().length>0;
    btn.style.background=ok?ac:"rgba(240,234,214,.08)";
    btn.style.color=ok?"#111":"rgba(240,234,214,.2)";
    btn.style.cursor=ok?"pointer":"not-allowed";
    btn.style.boxShadow=ok?`0 6px 20px ${ac}44`:"none";
  }
}

// ── APP ──
function renderApp(){
  const u=state.currentUser;
  const allVals=Object.values(state.items);
  const total=allVals.length;
  const done=allVals.filter(v=>v.done).length;
  const pct=total?Math.round(done/total*100):0;
  const onlineUsers=Object.values(state.presence).filter(p=>Date.now()-p.lastSeen<15000);
  const userStats=state.users.map(usr=>({...usr,count:allVals.filter(i=>i.by?.id===usr.id).length}));

  const avatarsHTML=onlineUsers.map((p,i)=>`
    <div title="${p.name}" style="margin-left:${i>0?"-8px":"0"};width:26px;height:26px;border-radius:50%;background:${p.color};border:2px solid #111;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#111;z-index:${onlineUsers.length-i}">
      ${p.name.slice(0,2).toUpperCase()}
    </div>`).join("");

  const chipsHTML=userStats.map(usr=>`
    <div data-switch="${usr.id}" style="display:flex;align-items:center;gap:6px;padding:4px 9px 4px 4px;border-radius:20px;cursor:pointer;background:${u.id===usr.id?`${usr.color}20`:"rgba(240,234,214,.04)"};border:1.5px solid ${u.id===usr.id?usr.color+"66":"rgba(240,234,214,.08)"};">
      <div style="width:24px;height:24px;border-radius:50%;background:${usr.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#111">${usr.name.slice(0,2).toUpperCase()}</div>
      <div>
        <div style="font-size:12px;font-weight:600;color:${usr.color};line-height:1">${usr.name}</div>
        <div style="font-size:9px;color:rgba(240,234,214,.3);font-family:'Barlow',sans-serif">${usr.count} ✓</div>
      </div>
      ${u.id===usr.id?`<div style="width:5px;height:5px;border-radius:50%;background:${usr.color}"></div>`:""}
    </div>`).join("");

  const tickerHTML=state.log.slice(0,6).map(e=>`
    <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;font-size:11px;color:rgba(240,234,214,.4);background:rgba(240,234,214,.04);border-radius:20px;padding:3px 9px">
      <div style="width:14px;height:14px;border-radius:50%;background:${e.user.color};display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:#111;flex-shrink:0">${e.user.name.slice(0,2).toUpperCase()}</div>
      <span style="color:${e.user.color};font-weight:600">${e.user.name}</span>
      <span style="font-style:italic;color:rgba(240,234,214,.55)">${e.text.length>18?e.text.slice(0,18)+"…":e.text}</span>
      <span style="color:rgba(240,234,214,.2);font-size:9px">${timeAgo(e.at)}</span>
    </div>`).join("");

  const sectionsHTML=PREP_DATA.map(sec=>{
    const sItems=sec.items.map(item=>({item,key:`${sec.section}__${item}`,st:state.items[`${sec.section}__${item}`]}));
    const visible=sItems.filter(i=>i.st?.visible);
    const doneInSec=sItems.filter(i=>i.st?.done).length;
    const tot=sItems.length;
    const allDone=tot>0&&doneInSec===tot;

    const rowsHTML=visible.map(({item,key,st})=>`
      <div class="item-row${st?.done?" vanishing":""}" data-check="${key}" data-text="${item.replace(/"/g,"&quot;")}">
        <div class="check-btn" style="background:${st?.done?u.color:"transparent"};border-color:${st?.done?u.color:"rgba(240,234,214,.2)"}">
          ${st?.done?`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5L5 9.5L11 3.5" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
        </div>
        <span style="flex:1;font-size:14px;font-weight:500;letter-spacing:.02em;color:rgba(240,234,214,.85);user-select:none">${item}</span>
        ${st?.done&&st?.by?`<div style="width:18px;height:18px;border-radius:50%;background:${st.by.color};display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#111;flex-shrink:0">${st.by.name.slice(0,2).toUpperCase()}</div>`:""}
      </div>`).join("");

    return `
    <div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:9px;padding-bottom:7px;border-bottom:2px solid ${allDone?"#6BCB7744":u.color+"44"}">
        <span style="font-size:16px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:${allDone?"#6BCB77":"#f0ead6"}">${sec.section}</span>
        ${tot>0?`<span style="font-size:11px;color:${allDone?"#6BCB77":"rgba(240,234,214,.3)"};font-family:'Barlow',sans-serif">${doneInSec}/${tot}</span>`:""}
        ${allDone&&tot>0?`<span style="margin-left:auto;color:#6BCB77;font-size:13px">✓</span>`:""}
      </div>
      ${tot===0
        ?`<div style="font-size:12px;color:rgba(240,234,214,.2);font-style:italic;font-family:'Barlow',sans-serif;padding:5px 0">No sub-tasks</div>`
        :visible.length===0
          ?`<div style="font-size:13px;color:#6BCB77;padding:5px 0;font-family:'Barlow',sans-serif">✓ All done!</div>`
          :rowsHTML}
    </div>`;
  }).join("");

  const resetHTML=state.showReset
    ?`<div style="display:flex;gap:8px;align-items:center;background:#1a1a1a;border:1px solid rgba(240,234,214,.15);border-radius:14px;padding:9px 12px;box-shadow:0 8px 32px rgba(0,0,0,.6)">
        <span style="font-size:13px;color:rgba(240,234,214,.5);font-family:'Barlow',sans-serif">¿Seguro?</span>
        <button id="confirm-reset" style="padding:7px 14px;background:#e74c3c;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Sí</button>
        <button id="cancel-reset" style="padding:7px 11px;background:rgba(240,234,214,.07);border:1px solid rgba(240,234,214,.1);border-radius:8px;color:rgba(240,234,214,.5);font-size:13px">No</button>
      </div>`
    :`<button id="reset-btn" style="padding:10px 16px;background:rgba(240,234,214,.07);border:1px solid rgba(240,234,214,.12);border-radius:12px;color:rgba(240,234,214,.4);font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;backdrop-filter:blur(12px)">↺ Reiniciar</button>`;

  return `
  <div style="min-height:100vh;padding-bottom:100px">
    <!-- HEADER -->
    <div style="position:sticky;top:0;z-index:100;background:#111;border-bottom:1px solid rgba(240,234,214,.1)">
      <div style="max-width:960px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:100px">
          <div style="font-size:10px;letter-spacing:.2em;color:#e8b86d;font-weight:600;text-transform:uppercase">Dinner Service</div>
          <div style="font-size:22px;font-weight:700;letter-spacing:.03em;line-height:1.1">PREP LIST</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="position:relative;display:inline-flex;width:10px;height:10px">
            <span style="position:absolute;inset:0;border-radius:50%;background:#6BCB77;opacity:.5;animation:ping 1.4s cubic-bezier(0,0,.2,1) infinite"></span>
            <span style="position:relative;width:10px;height:10px;border-radius:50%;background:#6BCB77;display:block"></span>
          </span>
          <div style="display:flex">${avatarsHTML}</div>
          <span style="font-size:11px;color:rgba(240,234,214,.3);font-family:'Barlow',sans-serif">${onlineUsers.length} online</span>
        </div>
        <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
          ${chipsHTML}
          <button id="switch-btn" style="padding:6px 11px;background:rgba(240,234,214,.05);border:1px solid rgba(240,234,214,.1);border-radius:20px;color:rgba(240,234,214,.35);font-size:11px;letter-spacing:.06em">+ Cambiar</button>
        </div>
        <div style="text-align:right;min-width:50px">
          <div style="font-size:26px;font-weight:700;line-height:1;color:${pct===100?"#6BCB77":"#e8b86d"}">${pct}<span style="font-size:12px;opacity:.5;font-weight:400">%</span></div>
          <div style="font-size:10px;color:rgba(240,234,214,.3);font-family:'Barlow',sans-serif">${done}/${total}</div>
        </div>
      </div>
      <div style="height:3px;background:rgba(240,234,214,.07)">
        <div style="height:100%;width:${pct}%;background:${pct===100?"linear-gradient(90deg,#6BCB77,#4ECDC4)":`linear-gradient(90deg,${u.color},${u.color}aa)`};transition:width .5s ease;box-shadow:0 0 8px ${u.color}66"></div>
      </div>
      ${state.log.length>0?`
      <div style="padding:6px 16px;background:rgba(240,234,214,.015);border-bottom:1px solid rgba(240,234,214,.05);display:flex;gap:10px;overflow-x:auto">
        ${tickerHTML}
      </div>`:""}
    </div>

    <!-- GRID -->
    <div style="max-width:960px;margin:0 auto;padding:20px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px 22px">
      ${sectionsHTML}
    </div>

    <!-- RESET -->
    <div style="position:fixed;bottom:22px;right:20px;z-index:999">${resetHTML}</div>
  </div>`;
}

function attachAppEvents(){
  document.querySelectorAll("[data-check]").forEach(row=>{
    row.addEventListener("click",()=>{
      if(!state.items[row.dataset.check]?.done) checkItem(row.dataset.check,row.dataset.text);
    });
  });
  document.querySelectorAll("[data-switch]").forEach(chip=>{
    chip.addEventListener("click",()=>{
      const u=state.users.find(x=>x.id===chip.dataset.switch);
      if(u){state.currentUser=u;render();}
    });
  });
  document.getElementById("switch-btn")?.addEventListener("click",()=>{state.screen="login";render();});
  document.getElementById("reset-btn")?.addEventListener("click",()=>{state.showReset=true;render();});
  document.getElementById("confirm-reset")?.addEventListener("click",resetAll);
  document.getElementById("cancel-reset")?.addEventListener("click",()=>{state.showReset=false;render();});
}

  name:"Prep List — Dinner Service",short_name:"Prep List",
  start_url:"/",display:"standalone",
  background_color:"#111111",theme_color:"#111111",
  icons:[
    {src:"data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%23111'/><text x='96' y='130' font-size='100' text-anchor='middle' fill='%23e8b86d'>📋</text></svg>`),sizes:"192x192",type:"image/svg+xml"},
  ]
};
const ml=document.createElement("link");
ml.rel="manifest";
ml.href=URL.createObjectURL(new Blob([JSON.stringify(manifestData)],{type:"application/manifest+json"}));
document.head.appendChild(ml);

render();
setInterval(heartbeat, 5000);

// Hide loading after 3s max
setTimeout(()=>{ document.getElementById("loading").style.display="none"; }, 3000);
</script>
